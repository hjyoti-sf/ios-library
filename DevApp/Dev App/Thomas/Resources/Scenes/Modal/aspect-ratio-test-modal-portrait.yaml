# Tests aspect_ratio on ThomasConstrainedSize (modal placement): width:60%, height:auto, aspect_ratio:0.5625 (9:16)
version: 1
presentation:
  type: modal
  dismiss_on_touch_outside: true
  default_placement:
    size:
      width: 60%
      height: auto
      aspect_ratio: 0.5625
    position:
      horizontal: center
      vertical: center
    shade_color:
      default:
        hex: '#000000'
        alpha: 0.6
    background_color:
      default:
        hex: '#4A148C'
        alpha: 1
    border:
      radius: 12
view:
  type: linear_layout
  direction: vertical
  items:
    - size:
        width: 100%
        height: auto
      weight: 1
      view:
        type: container
        items:
          - position:
              horizontal: center
              vertical: center
            size:
              width: 80%
              height: auto
            view:
              type: label
              text: "Modal placement is 9:16 portrait — width 60%, height auto, aspect_ratio 0.5625"
              text_appearance:
                font_size: 15
                alignment: center
                styles:
                  - bold
                color:
                  default:
                    hex: '#FFFFFF'
                    alpha: 1
    - size:
        width: 80%
        height: auto
      margin:
        bottom: 24
        start: 24
        end: 24
      view:
        type: label_button
        identifier: dismiss_btn
        background_color:
          default:
            hex: '#FFFFFF'
            alpha: 0.2
        border:
          radius: 8
          stroke_color:
            default:
              hex: '#FFFFFF'
              alpha: 0.6
          stroke_width: 1
        button_click:
          - dismiss
        label:
          type: label
          text: Dismiss
          text_appearance:
            font_size: 16
            alignment: center
            color:
              default:
                hex: '#FFFFFF'
                alpha: 1
