version: 1
presentation:
  type: modal
  dismiss_on_touch_outside: true
  default_placement:
    size:
      width: 90%
      height: auto
    shade_color:
      default:
        hex: '#000000'
        alpha: 0.6
view:
  type: state_controller
  view:
    type: pager_controller
    identifier: auto_height_pager
    view:
      type: container
      background_color:
        default:
          hex: '#1a1a2e'
          alpha: 1
      border:
        radius: 16
        stroke_width: 1
        stroke_color:
          default:
            hex: '#FFFFFF'
            alpha: 0.15
      items:
      - position:
          horizontal: center
          vertical: center
        size:
          width: 100%
          height: auto
        view:
          type: pager
          disable_swipe: false
          items:

          - identifier: page_short
            type: pager_item
            view:
              type: linear_layout
              direction: vertical
              items:
              - size:
                  width: 100%
                  height: auto
                margin:
                  top: 40
                  bottom: 16
                  start: 24
                  end: 24
                view:
                  type: label
                  text: Short Page
                  text_appearance:
                    font_size: 28
                    alignment: center
                    styles:
                    - bold
                    color:
                      default:
                        hex: '#FFFFFF'
                        alpha: 1
              - size:
                  width: 100%
                  height: auto
                margin:
                  top: 0
                  bottom: 40
                  start: 24
                  end: 24
                view:
                  type: label
                  text: This page has minimal content.
                  text_appearance:
                    font_size: 16
                    alignment: center
                    color:
                      default:
                        hex: '#FFFFFF'
                        alpha: 0.8

          - identifier: page_medium
            type: pager_item
            view:
              type: linear_layout
              direction: vertical
              items:
              - size:
                  width: 100%
                  height: auto
                margin:
                  top: 40
                  bottom: 16
                  start: 24
                  end: 24
                view:
                  type: label
                  text: Medium Page
                  text_appearance:
                    font_size: 28
                    alignment: center
                    styles:
                    - bold
                    color:
                      default:
                        hex: '#FFFFFF'
                        alpha: 1
              - size:
                  width: 100%
                  height: auto
                margin:
                  top: 0
                  bottom: 16
                  start: 24
                  end: 24
                view:
                  type: label
                  text: This page has a moderate amount of content to demonstrate how the auto-height modal adjusts to fit varying content sizes across different pager pages.
                  text_appearance:
                    font_size: 16
                    alignment: center
                    color:
                      default:
                        hex: '#FFFFFF'
                        alpha: 0.8
              - size:
                  width: 100%
                  height: auto
                margin:
                  top: 0
                  bottom: 40
                  start: 24
                  end: 24
                view:
                  type: label
                  text: The modal height should grow to accommodate this text naturally without using a fixed percentage.
                  text_appearance:
                    font_size: 14
                    alignment: center
                    color:
                      default:
                        hex: '#FFFFFF'
                        alpha: 0.6

          - identifier: page_tall
            type: pager_item
            view:
              type: linear_layout
              direction: vertical
              items:
              - size:
                  width: 100%
                  height: auto
                margin:
                  top: 40
                  bottom: 16
                  start: 24
                  end: 24
                view:
                  type: label
                  text: Tall Page
                  text_appearance:
                    font_size: 28
                    alignment: center
                    styles:
                    - bold
                    color:
                      default:
                        hex: '#FFFFFF'
                        alpha: 1
              - size:
                  width: 100%
                  height: auto
                margin:
                  top: 0
                  bottom: 16
                  start: 24
                  end: 24
                view:
                  type: label
                  text: This is the tallest page in the pager. It has significantly more text content than the other pages to test that the auto-height modal can handle large variations in content size between pages.
                  text_appearance:
                    font_size: 16
                    alignment: center
                    color:
                      default:
                        hex: '#FFFFFF'
                        alpha: 0.8
              - size:
                  width: 100%
                  height: auto
                margin:
                  top: 0
                  bottom: 16
                  start: 24
                  end: 24
                view:
                  type: label
                  text: When swiping between pages, the modal should resize smoothly. The short page should result in a compact modal, while this page should stretch the modal taller to fit all the content.
                  text_appearance:
                    font_size: 14
                    alignment: center
                    color:
                      default:
                        hex: '#FFFFFF'
                        alpha: 0.6
              - size:
                  width: 100%
                  height: auto
                margin:
                  top: 0
                  bottom: 16
                  start: 24
                  end: 24
                view:
                  type: label
                  text: Here is even more text to really push the height. The pager indicator and close button should remain properly positioned regardless of how tall this page gets. This tests the full auto-height layout pipeline from the presentation layer through the pager and into the content views.
                  text_appearance:
                    font_size: 14
                    alignment: center
                    color:
                      default:
                        hex: '#FFFFFF'
                        alpha: 0.5
              - size:
                  width: 100%
                  height: 50
                margin:
                  top: 8
                  bottom: 40
                  start: 24
                  end: 24
                view:
                  type: label_button
                  identifier: example_button
                  background_color:
                    default:
                      hex: '#e94560'
                      alpha: 1
                  border:
                    radius: 25
                    stroke_width: 0
                  button_click:
                  - pager_next
                  label:
                    type: label
                    text: Go to tiny page
                    text_appearance:
                      font_size: 16
                      alignment: center
                      styles:
                      - bold
                      color:
                        default:
                          hex: '#FFFFFF'
                          alpha: 1

          - identifier: page_tiny
            type: pager_item
            view:
              type: linear_layout
              direction: vertical
              items:
              - size:
                  width: 100%
                  height: auto
                margin:
                  top: 32
                  bottom: 32
                  start: 24
                  end: 24
                view:
                  type: label
                  text: Tiny!
                  text_appearance:
                    font_size: 22
                    alignment: center
                    styles:
                    - bold
                    color:
                      default:
                        hex: '#FFFFFF'
                        alpha: 1

      - position:
          horizontal: end
          vertical: top
        margin:
          top: 12
          end: 12
        size:
          width: 28
          height: 28
        view:
          type: image_button
          identifier: close_button
          button_click:
          - dismiss
          image:
            type: icon
            icon: close
            color:
              default:
                hex: '#FFFFFF'
                alpha: 0.8
            scale: 0.6

      - position:
          horizontal: center
          vertical: bottom
        margin:
          bottom: 12
        size:
          height: 8
          width: 100%
        view:
          type: pager_indicator
          spacing: 8
          bindings:
            selected:
              shapes:
              - type: ellipse
                aspect_ratio: 1
                scale: 1
                color:
                  default:
                    hex: '#FFFFFF'
                    alpha: 1
            unselected:
              shapes:
              - type: ellipse
                aspect_ratio: 1
                scale: 1
                color:
                  default:
                    hex: '#FFFFFF'
                    alpha: 0.3
